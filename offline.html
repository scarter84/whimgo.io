<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Whim — Offline</title>
  <style>
    body {
      background: #0e0e0e; color: #dce4ee;
      font-family: 'JetBrains Mono', monospace;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 100vh; margin: 0; text-align: center;
      padding: 2rem;
    }
    h1 { color: #00ff00; font-size: 2rem; margin-bottom: 0.5rem; }
    p { color: #888; font-size: 0.9rem; max-width: 400px; line-height: 1.6; }
    .dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: #e08030; margin: 1.5rem auto;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  </style>
</head>
<body>
  <h1>WHIM</h1>
  <div class="dot"></div>
  <p>You're offline. The cached version of the site will load when a connection is restored. The sovereign stack keeps running on your hardware regardless.</p>
</body>
</html>
